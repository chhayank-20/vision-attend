services:
  backend:
    build: ./backend
    container_name: vision-attend-backend
    volumes:
      - ./backend/vision_attend.db:/app/vision_attend.db
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./vision_attend.db
      - SECRET_KEY=prod-secret-key-please-change
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vision-attend-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
