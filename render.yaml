services:
  # 1. Backend Web Service
  - type: web
    name: vision-attend-backend
    runtime: python
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vision-attend-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
    buildCommand: |
      curl -LsSf https://astral.sh/uv/install.sh | sh
      source $HOME/.cargo/env
      cd backend && uv sync --frozen --no-dev
    startCommand: cd backend && .venv/bin/gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free

  # 2. Frontend Static Site
  - type: static_site
    name: vision-attend-frontend
    buildCommand: cd frontend && pnpm install && pnpm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vision-attend-backend
          type: web
          property: url

databases:
  - name: vision-attend-db
    plan: free
