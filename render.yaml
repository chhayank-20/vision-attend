services:
  # 1. Backend Web Service
  - type: web
    name: vision-attend-backend
    runtime: python
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vision-attend-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
    buildCommand: |
      pip install uv
      cd backend && uv sync --frozen --no-dev --python-preference only-system
    startCommand: cd backend && .venv/bin/gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free

  # 2. Frontend Static Site
  - type: web
    name: vision-attend-frontend
    runtime: static
    buildCommand: cd frontend && pnpm install && pnpm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://vision-attend-backend.onrender.com

databases:
  - name: vision-attend-db
    plan: free
